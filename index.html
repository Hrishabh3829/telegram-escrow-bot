<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Bot</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js" type="module"></script>

</head>

<body class="bg-gray-50 text-gray-800">

<div class="min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-xl font-semibold tracking-tight">Escrow Bot</h1>
            <p class="text-xs text-green-600 mt-1">● Secure & Online</p>
        </div>

        <!-- CTA -->
        <a href="https://t.me/Blaze567bot" target="_blank"
           class="block mt-5 w-full text-center bg-blue-500 text-white py-2.5 rounded-lg
           hover:bg-blue-600 transition duration-200">
            Open Telegram Bot
        </a>

        <!-- Secondary action -->
        <button onclick="copyUsername()"
            class="mt-3 w-full text-sm border border-gray-200 py-2 rounded-lg hover:bg-gray-50 transition">
            Copy @Blaze567bot
        </button>

        <!-- Divider -->
        <div class="my-5 border-t border-gray-100"></div>

        <!-- Steps -->
        <div class="space-y-3 text-sm">

            <p class="flex gap-2"><span>1.</span> Open bot and type <span class="font-medium">/start</span></p>
            <p class="flex gap-2"><span>2.</span> Choose <span class="font-medium">Buyer</span></p>
            <p class="flex gap-2"><span>3.</span> Enter seller username</p>

            <!-- Warning -->
            <div class="bg-red-50 border border-red-100 text-red-600 p-3 rounded-lg text-xs">
                Seller must also start the bot and stay online
            </div>

            <p class="flex gap-2"><span>4.</span> Seller receives Deal ID</p>
            <p class="flex gap-2"><span>5.</span> Accept or reject deal</p>

        </div>

        <!-- Small info -->
        <p class="text-xs text-gray-400 mt-4 text-center">
            Fast • Secure • Simple escrow flow
        </p>

        <!-- Footer -->
        <div class="mt-3 text-center">
            <a href="https://t.me/safe_escrow_deals" target="_blank"
               class="text-xs text-blue-500 hover:underline">
               Join community
            </a>
        </div>

        <!-- Animation -->
        <div class="flex justify-center mt-5">
            <dotlottie-wc
            src="https://lottie.host/ebd162be-722f-402d-920b-8d014e839dc6/PDsy0s5PnC.lottie"
            style="width:160px;height:160px"
            autoplay
            loop>
            </dotlottie-wc>
        </div>

    </div>

</div>

<script>
function copyUsername() {
    navigator.clipboard.writeText("@Blaze567bot");
}
</script>

</body>
</html>
